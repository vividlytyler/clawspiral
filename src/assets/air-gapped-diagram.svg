<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#0f172a"/>

  <!-- ===== LEFT SIDE: Traditional Setup ===== -->
  <text x="170" y="30" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#f87171">Traditional Setup</text>

  <!-- Laptop -->
  <rect x="95" y="55" width="150" height="95" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <rect x="110" y="70" width="120" height="60" rx="4" fill="#0f172a"/>
  <text x="170" y="102" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">Your Computer</text>
  <rect x="140" y="150" width="60" height="6" rx="3" fill="#334155"/>

  <!-- Cloud icon (internet) -->
  <ellipse cx="280" cy="110" rx="50" ry="28" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <ellipse cx="255" cy="120" rx="30" ry="20" fill="#1e3a5f"/>
  <ellipse cx="310" cy="118" rx="25" ry="18" fill="#1e3a5f"/>
  <text x="280" y="105" text-anchor="middle" font-family="system-ui" font-size="11" fill="#38bdf8">Internet</text>

  <!-- Arrows from laptop to internet -->
  <line x1="245" y1="102" x2="255" y2="108" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="245" y1="115" x2="255" y2="115" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="245" y1="128" x2="255" y2="122" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- Cloud AI providers -->
  <rect x="230" y="155" width="100" height="36" rx="6" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1"/>
  <text x="280" y="178" text-anchor="middle" font-family="system-ui" font-size="11" fill="#38bdf8">OpenAI / Anthropic</text>

  <rect x="230" y="200" width="100" height="36" rx="6" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1"/>
  <text x="280" y="223" text-anchor="middle" font-family="system-ui" font-size="11" fill="#38bdf8">Google / Cohere</text>

  <line x1="280" y1="140" x2="280" y2="155" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Data leaves warning -->
  <rect x="100" y="265" width="200" height="40" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="200" y="283" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#fca5a5">⚠ DATA LEAVES YOUR NETWORK</text>
  <text x="200" y="298" text-anchor="middle" font-family="system-ui" font-size="10" fill="#fca5a5">HR docs, financial records,</text>
  <text x="200" y="310" text-anchor="middle" font-family="system-ui" font-size="10" fill="#fca5a5">legal files, PII — all sent externally</text>

  <line x1="170" y1="155" x2="170" y2="265" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>

  <!-- Red X marks -->
  <circle cx="80" cy="80" r="10" fill="#7f1d1d" stroke="#ef4444" stroke-width="2"/>
  <text x="80" y="85" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#ef4444">✕</text>
  <circle cx="80" cy="130" r="10" fill="#7f1d1d" stroke="#ef4444" stroke-width="2"/>
  <text x="80" y="135" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#ef4444">✕</text>

  <!-- ===== RIGHT SIDE: Air-Gapped Setup ===== -->
  <text x="680" y="30" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#10b981">Air-Gapped Setup</text>

  <!-- Dashed border circle around isolated area -->
  <ellipse cx="680" cy="160" rx="210" ry="150" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="10,6" opacity="0.7"/>
  <text x="680" y="45" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#10b981">AIR-GAPPED ZONE</text>

  <!-- Laptop -->
  <rect x="605" y="75" width="150" height="95" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <rect x="620" y="90" width="120" height="60" rx="4" fill="#0f172a"/>
  <text x="680" y="122" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">Your Computer</text>
  <rect x="650" y="170" width="60" height="6" rx="3" fill="#334155"/>

  <!-- OpenClaw box inside -->
  <rect x="520" y="105" width="80" height="36" rx="6" fill="#0f3660" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="560" y="127" text-anchor="middle" font-family="system-ui" font-size="11" fill="#38bdf8">OpenClaw</text>

  <!-- Ollama box inside -->
  <rect x="760" y="105" width="80" height="36" rx="6" fill="#0f3660" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="800" y="127" text-anchor="middle" font-family="system-ui" font-size="11" fill="#a78bfa">Ollama</text>

  <!-- Connection between OpenClaw and Ollama -->
  <line x1="600" y1="123" x2="760" y2="123" stroke="#10b981" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Local arrow indicators -->
  <line x1="560" y1="141" x2="560" y2="155" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <line x1="800" y1="141" x2="800" y2="155" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Privacy benefits inside air-gapped zone -->
  <rect x="510" y="195" width="340" height="80" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="680" y="215" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#6ee7b7">🔒 YOUR DATA NEVER LEAVES THIS MACHINE</text>
  <text x="680" y="234" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6ee7b7">HR records · Financial documents · Legal files</text>
  <text x="680" y="250" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6ee7b7">Medical records · Proprietary code · PII</text>
  <text x="680" y="266" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6ee7b7">All processed locally. Zero external transmission.</text>

  <!-- Shield icon -->
  <circle cx="680" cy="320" r="30" fill="#065f46" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>
  <text x="680" y="328" text-anchor="middle" font-family="system-ui" font-size="28">🛡</text>
  <text x="680" y="360" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#10b981">Fully Isolated</text>

  <!-- ===== CENTER DIVIDER ===== -->
  <line x1="450" y1="20" x2="450" y2="400" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="450" y="415" text-anchor="middle" font-family="system-ui" font-size="11" fill="#475569">vs</text>

  <!-- ===== BOTTOM COMPARISON ===== -->
  <rect x="30" y="375" width="180" height="30" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="120" y="394" text-anchor="middle" font-family="system-ui" font-size="10" fill="#fca5a5">Cloud: External exposure at every step</text>

  <rect x="690" y="375" width="180" height="30" rx="6" fill="#022c22" stroke="#10b981" stroke-width="1"/>
  <text x="780" y="394" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6ee7b7">Local: Data never leaves your machine</text>
</svg>
