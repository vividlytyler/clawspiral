<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark slate circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#334155" stroke-width="1.5"/>
  <!-- Subtle accent ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#38bdf8" stroke-width="0.5" stroke-opacity="0.4"/>
  <!-- Gecko emoji, scaled to fit nicely -->
  <text x="32" y="32" font-size="34" text-anchor="middle" dominant-baseline="middle" dy="1">🦎</text>
</svg>