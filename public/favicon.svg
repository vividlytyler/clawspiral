<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#334155" stroke-width="1"/>
  <!-- Subtle accent ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#accent)" stroke-width="0.75" stroke-opacity="0.5"/>
  <!-- Claw mark — three curved strokes representing a gecko claw -->
  <g transform="translate(32,33)" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" fill="none">
    <!-- Middle toe -->
    <path d="M0,-14 Q0,-6 0,2"/>
    <!-- Left toe -->
    <path d="M0,-14 Q-6,-8 -9,0"/>
    <!-- Right toe -->
    <path d="M0,-14 Q6,-8 9,0"/>
  </g>
  <!-- Small toe pads -->
  <circle cx="0" cy="2" r="2" fill="#38bdf8" opacity="0.7"/>
  <circle cx="-9" cy="0" r="2" fill="#38bdf8" opacity="0.7"/>
  <circle cx="9" cy="0" r="2" fill="#38bdf8" opacity="0.7"/>
</svg>