<svg viewBox="0 0 920 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <filter id="glow-emerald">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coveredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="440" fill="#020617"/>

  <!-- ===== LEFT SIDE: Traditional Setup ===== -->
  <text x="195" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#f87171" letter-spacing="0.5">Traditional Setup — Data at Risk</text>

  <!-- Laptop -->
  <rect x="95" y="48" width="200" height="110" rx="10" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <rect x="110" y="62" width="170" height="72" rx="6" fill="#0f172a"/>
  <text x="195" y="93" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">Your Computer</text>
  <rect x="155" y="158" width="80" height="7" rx="3.5" fill="#334155"/>

  <!-- Internet cloud -->
  <ellipse cx="310" cy="105" rx="55" ry="30" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <ellipse cx="282" cy="115" rx="32" ry="22" fill="#1e3a5f"/>
  <ellipse cx="342" cy="113" rx="28" ry="20" fill="#1e3a5f"/>
  <text x="310" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#38bdf8" font-weight="600">INTERNET</text>

  <!-- Arrows: laptop → internet (red, dangerous) -->
  <line x1="295" y1="100" x2="278" y2="107" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)" opacity="0.9"/>
  <line x1="295" y1="115" x2="278" y2="115" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)" opacity="0.9"/>
  <line x1="295" y1="130" x2="278" y2="123" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)" opacity="0.9"/>

  <!-- Cloud AI providers (outside, on internet) -->
  <rect x="245" y="168" width="130" height="36" rx="7" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="310" y="191" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#7dd3fc">OpenAI · Anthropic · Google</text>

  <line x1="310" y1="140" x2="310" y2="168" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>

  <!-- Data leak box -->
  <rect x="70" y="278" width="250" height="68" rx="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="195" y="299" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#fca5a5">⚠  DATA LEAVES YOUR NETWORK</text>
  <text x="195" y="318" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#fca5a5">HR docs · Financial records · Legal files</text>
  <text x="195" y="333" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#fca5a5">Medical records · PII · Proprietary code</text>
  <text x="195" y="348" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#fca5a5">— sent to third-party servers permanently</text>

  <line x1="195" y1="168" x2="195" y2="278" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)" opacity="0.7"/>

  <!-- Red X icons -->
  <circle cx="70" cy="65" r="12" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="70" y="70" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="900" fill="#ef4444">✕</text>
  <circle cx="70" cy="130" r="12" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="70" y="135" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="900" fill="#ef4444">✕</text>

  <!-- ===== RIGHT SIDE: Air-Gapped Setup ===== -->
  <text x="720" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#10b981" letter-spacing="0.5">Air-Gapped Setup — Data Never Leaves</text>

  <!-- Air-gapped zone border -->
  <ellipse cx="720" cy="175" rx="215" ry="158" fill="none" stroke="#10b981" stroke-width="2.5" stroke-dasharray="12,7" opacity="0.6"/>
  <text x="720" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#10b981" letter-spacing="1">━━━  AIR-GAPPED ZONE  ━━━</text>

  <!-- Laptop -->
  <rect x="625" y="68" width="190" height="108" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <rect x="640" y="82" width="160" height="70" rx="6" fill="#0f172a"/>
  <text x="720" y="113" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">Your Computer</text>
  <rect x="680" y="176" width="80" height="7" rx="3.5" fill="#334155"/>

  <!-- OpenClaw box -->
  <rect x="530" y="100" width="92" height="40" rx="7" fill="#0c2d5c" stroke="#38bdf8" stroke-width="2"/>
  <text x="576" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#38bdf8" font-weight="600">OpenClaw</text>
  <text x="576" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#7dd3fc">agent + tools</text>

  <!-- Ollama box -->
  <rect x="818" y="100" width="92" height="40" rx="7" fill="#2e1065" stroke="#a78bfa" stroke-width="2"/>
  <text x="864" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#a78bfa" font-weight="600">Ollama</text>
  <text x="864" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#c4b5fd">local LLM</text>

  <!-- Connection: OpenClaw ↔ Ollama -->
  <line x1="622" y1="120" x2="818" y2="120" stroke="#10b981" stroke-width="2.5" stroke-dasharray="7,4"/>
  <circle cx="720" cy="120" r="5" fill="#10b981"/>
  <line x1="622" y1="120" x2="715" y2="120" stroke="#10b981" stroke-width="2.5"/>
  <line x1="725" y1="120" x2="818" y2="120" stroke="#10b981" stroke-width="2.5"/>

  <!-- Privacy box -->
  <rect x="515" y="195" width="410" height="78" rx="9" fill="#022c22" stroke="#10b981" stroke-width="1.5"/>
  <text x="720" y="216" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#6ee7b7">🔒  DATA NEVER LEAVES THIS MACHINE</text>
  <text x="720" y="235" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6ee7b7">HR records  ·  Financial documents  ·  Legal files  ·  Medical records</text>
  <text x="720" y="251" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6ee7b7">PII  ·  Proprietary code  ·  M&amp;A documents  ·  Attorney-client privilege</text>
  <text x="720" y="267" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6ee7b7">All processed locally.  Zero external transmission.  Zero API costs.</text>

  <!-- Shield icon -->
  <circle cx="720" cy="330" r="32" fill="#064e3b" stroke="#10b981" stroke-width="2.5"/>
  <text x="720" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="30">🛡</text>
  <text x="720" y="375" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#10b981">Fully Isolated · Zero Data Leak</text>

  <!-- ===== CENTER DIVIDER ===== -->
  <line x1="460" y1="15" x2="460" y2="425" stroke="#334155" stroke-width="1.5" stroke-dasharray="10,5"/>
  <text x="460" y="422" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">●  vs  ●</text>

  <!-- ===== BOTTOM COMPARISON ===== -->
  <rect x="20" y="395" width="210" height="32" rx="7" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="125" y="415" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#fca5a5">Cloud: Data exposed at every step</text>

  <rect x="690" y="395" width="210" height="32" rx="7" fill="#022c22" stroke="#10b981" stroke-width="1"/>
  <text x="795" y="415" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6ee7b7">Local: Data never leaves your machine</text>
</svg>
